# HTTP -> HTTPS л¦¬л‹¤мќґл ‰нЉё (л‹Ё, ACME challengeлЉ” к·ёлЊЂлЎњ н†µкіј)
server {
    listen 80;
    server_name 15.165.98.76.nip.io;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS л©”мќё м„њлІ„
server {
    listen 443 ssl;
    server_name 15.165.98.76.nip.io;

    ssl_certificate     /etc/letsencrypt/live/15.165.98.76.nip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/15.165.98.76.nip.io/privkey.pem;

    location = /healthz {
        return 200 'kkumteul backend is running\n';
        add_header Content-Type text/plain;
    }

    location / {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
